{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Add New Habit</h1>
        <a href="{{ url_for('habits') }}" class="btn btn-secondary">Back to Habits</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="form-card">
        <form method="POST" action="{{ url_for('add_habit') }}">

            <div class="form-group">
                <label for="name">Habit Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="e.g. Drink Water"
                       required maxlength="100">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description"
                       placeholder="e.g. Drink 8 glasses a day" maxlength="200">
            </div>

            <div class="form-group">
                <label for="frequency">Frequency <span class="required">*</span></label>
                <select id="frequency" name="frequency" required>
                    <option value="" disabled selected>Select frequency</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Add Habit</button>
        </form>
    </div>
</div>
{% endblock %}
