{% extends "base.html" %}

{% block content %}
<div class="page-container" style="max-width: 480px; margin: 0 auto;">
    <div class="page-header">
        <h1>Create Account</h1>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="form-card">
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Username <span class="required">*</span></label>
                <input type="text" id="username" name="username" placeholder="e.g. johndoe"
                       required maxlength="50" value="{{ request.form.get('username', '') }}">
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="you@example.com"
                       required maxlength="150" value="{{ request.form.get('email', '') }}">
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password"
                       placeholder="At least 6 characters" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <p style="text-align: center; margin-top: 1rem;">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
