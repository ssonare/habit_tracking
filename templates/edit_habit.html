{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Edit Habit</h1>
        <a href="{{ url_for('habits') }}" class="btn btn-secondary">Back to Habits</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="form-container">
        <form method="POST" action="{{ url_for('edit_habit', habit_id=habit.id) }}">
            <div class="form-group">
                <label for="name">Habit Name <span class="required">*</span></label>
                <input type="text" id="name" name="name"
                       value="{{ habit.name }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description"
                          rows="3">{{ habit.description if habit.description else '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="frequency">Frequency <span class="required">*</span></label>
                <select id="frequency" name="frequency" required>
                    <option value="Daily"
                        {% if habit.frequency == 'Daily' %}selected{% endif %}>Daily</option>
                    <option value="Weekly"
                        {% if habit.frequency == 'Weekly' %}selected{% endif %}>Weekly</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for cat in ['Fitness', 'Health', 'Finance', 'Chores', 'Learning', 'Social', 'Other', 'Uncategorized'] %}
                    <option value="{{ cat }}" {% if habit.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Habit</button>
                <a href="{{ url_for('habits') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
