<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-name">Habit Tracking</span>
            <span class="brand-tagline">Build better habits</span>
        </div>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('habits') }}">My Habits</a>
            <a href="{{ url_for('archived_habits') }}">Archived</a>
            <a href="{{ url_for('add_habit') }}">+ Add Habit</a>
            <a href="{{ url_for('logout') }}" class="btn-signin">Log Out ({{current_user.username}})</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn-signin">Sign In</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Habit Tracking. All rights reserved.</p>
    </footer>
</body>
</html>
